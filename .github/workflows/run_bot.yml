name: ClaudeBot + NoBot Paper Traders
on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 * * * *'
    - cron: '0 1 */2 * *'    # every 2 days at 1am UTC (opus_reflect)
    - cron: '0 2 * * *'      # daily at 2am UTC (self_audit)
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run NearCertain backtest'
        required: false
        default: 'false'
jobs:
  run-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install anthropic requests ddgs feedparser
      - name: Run NearCertain backtest (manual trigger only)
        if: github.event.inputs.run_backtest == 'true'
        run: |
          python backtest_nearcertain.py
          echo "Backtest complete"
      - name: Run NoBot V1 (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
        run: python nobot.py --single-scan
      - name: Run NoBot V2 (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
        run: python nobot_v2.py --single-scan
      - name: Run NoBot V3 — Weather Only (every 15 min)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
        run: python nobot_v3.py --single-scan
      - name: Sync investor pool
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python investor_sync.py
      - name: Run NearCertain (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
        run: python nearcertain.py --single-scan
      - name: Run Alpha-Prime -- Resolution Only (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python alpha_prime.py --single-scan

      - name: Run NearCertain Beta — Data Collector (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python nearcertain_beta.py --single-scan
      - name: Run AssetBot — Price Mismatch Scanner (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python assetbot.py --single-scan
      - name: Run ClaudeBot (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          VISUAL_CROSSING_API_KEY: ${{ secrets.VISUAL_CROSSING_API_KEY }}
        run: python claudebot.py --single-scan
      - name: Run ClaudeBot V2 — Aggressive Companion (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          VISUAL_CROSSING_API_KEY: ${{ secrets.VISUAL_CROSSING_API_KEY }}
        run: python claudebot_v2.py --single-scan
      - name: Run Opus Reflect — ClaudeBot Self-Reflection (every 2 days)
        if: github.event.schedule == '0 1 */2 * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python opus_reflect.py

      - name: Run Self-Audit — NearCertain → AlphaPrime (every 3 days)
        if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python self_audit.py

      - name: Run ClaudeBot V3 -- Data Collector (every hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PERSONAL_ID: ${{ secrets.TELEGRAM_PERSONAL_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          VISUAL_CROSSING_API_KEY: ${{ secrets.VISUAL_CROSSING_API_KEY }}
        run: python claudebot_v3.py --single-scan

      - name: Build trade knowledge graph
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -d "trade_reflections" ] && [ "$(ls -A trade_reflections 2>/dev/null)" ]; then
            echo "Building knowledge graph from $(ls trade_reflections | wc -l) reflection files..."
            python build_graph.py
          else
            echo "No reflection files yet - skipping graph build"
          fi
      - name: Commit updated logs back to repo
        if: always()
        run: |
          git config user.name "claudebot"
          git config user.email "claudebot@users.noreply.github.com"
          git add claudebot_log.json claudebot_v2_log.json claudebot_v3_log.json nobot_log.json nobot_v2_log.json nobot_v3_log.json nearcertain_log.json nearcertain_beta_log.json assetbot_log.json alpha_prime_log.json investor.html
          git add alpha_prime_config.json self_audit_state.json 2>/dev/null || true
          git add trade_reflections/ trade_reflections_v2/ trade_reflections_v3/ graphify-out/ 2>/dev/null || true
          git add backtest_nearcertain_*.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: update logs + reflections [$(date '+%Y-%m-%d %H:%M')]"
          git push
